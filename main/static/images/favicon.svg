<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- feather: same orientation as site logo, larger scale, lighter colors -->
  <g transform="translate(100,105) scale(-0.80,0.80) rotate(-45) translate(0,-169)">

    <!-- spine -->
    <path d="M0 300 C-4 220, 6 120, 0 0" fill="none" stroke="#A89FF5" stroke-width="6" stroke-linecap="round"/>

    <!-- left barbs -->
    <path d="M-1 56  C-16 44, -38 30, -50 14"    fill="none" stroke="#90AAFF" stroke-width="4.0" stroke-linecap="round"/>
    <path d="M-1 112 C-22 92, -54 70, -70 50"    fill="none" stroke="#90AAFF" stroke-width="5.0" stroke-linecap="round"/>
    <path d="M-1 168 C-24 140, -58 110, -76 84"  fill="none" stroke="#90AAFF" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M-1 224 C-18 196, -44 164, -58 140" fill="none" stroke="#90AAFF" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M-1 278 C-10 254, -22 228, -30 208" fill="none" stroke="#90AAFF" stroke-width="3.5" stroke-linecap="round"/>

    <!-- right barbs -->
    <path d="M1 56  C16 44,  38 30,  50 14"    fill="none" stroke="#7DE8C8" stroke-width="4.0" stroke-linecap="round"/>
    <path d="M1 112 C22 92,  54 70,  70 50"    fill="none" stroke="#7DE8C8" stroke-width="5.0" stroke-linecap="round"/>
    <path d="M1 168 C24 140, 58 110, 76 84"    fill="none" stroke="#7DE8C8" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M1 224 C18 196, 44 164, 58 140"   fill="none" stroke="#7DE8C8" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M1 278 C10 254, 22 228, 30 208"   fill="none" stroke="#7DE8C8" stroke-width="3.5" stroke-linecap="round"/>

    <!-- tip dot -->
    <circle cx="0" cy="0" r="7" fill="#7DE8C8"/>

    <!-- calamus -->
    <path d="M0 300 C-2 316, -1 328, 0 338" fill="none" stroke="#A89FF5" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  </g>

</svg>
